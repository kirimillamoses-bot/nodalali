<!doctype html>
<html><head><meta charset="utf-8"/><title>Nodalali</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
<style>
  html, body { margin:0; padding:0; background:#0a0a0a; }
  .icon {
    width: 1024px; height: 1024px; position: relative; overflow: hidden;
    background:
      linear-gradient(180deg, rgba(10,10,15,0.55) 0%, rgba(10,10,15,0.85) 100%),
      url('https://images.unsplash.com/photo-1564013799919-ab600027ffc6?w=1600&q=90');
    background-size: cover; background-position: center;
    font-family: 'Inter', sans-serif;
    color: #f5f1e8;
    display: flex; align-items: center; justify-content: center;
  }
  .icon::after {
    content: ""; position: absolute; inset: 0;
    background: radial-gradient(circle at 50% 50%, transparent 30%, rgba(0,0,0,0.85) 100%);
    pointer-events: none;
  }

  /* Thin gold inner frame */
  .frame {
    position: absolute; inset: 56px;
    border: 1px solid rgba(212, 175, 55, 0.35);
    pointer-events: none;
    z-index: 3;
  }
  .frame::before, .frame::after {
    content: ""; position: absolute;
    width: 32px; height: 32px;
    border: 2px solid #D4AF37;
  }
  .frame::before { top: -3px; left: -3px; border-right: none; border-bottom: none; }
  .frame::after  { bottom: -3px; right: -3px; border-left: none; border-top: none; }

  .center {
    position: relative; z-index: 5;
    display: flex; flex-direction: column; align-items: center;
    text-align: center;
  }

  /* Custom house monogram — geometric, drawn in CSS */
  .monogram {
    width: 180px; height: 180px;
    position: relative;
    margin-bottom: 50px;
  }
  .monogram svg { width: 100%; height: 100%; filter: drop-shadow(0 0 28px rgba(200,225,255,0.75)) drop-shadow(0 0 60px rgba(255,255,255,0.4)); }

  /* "Nodalali" wordmark in refined serif */
  .word {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 500;
    font-size: 200px;
    letter-spacing: -2px;
    line-height: 0.95;
    color: #f5f1e8;
    text-shadow: 0 6px 30px rgba(0,0,0,0.7);
    margin-bottom: 18px;
  }
  .word .dot {
    color: #D4AF37;
  }

  /* Gold divider with center diamond */
  .divider {
    display: flex; align-items: center; gap: 16px;
    margin: 22px 0;
  }
  .divider .line {
    width: 80px; height: 1px;
    background: linear-gradient(90deg, transparent 0%, #D4AF37 100%);
  }
  .divider .line.right { background: linear-gradient(270deg, transparent 0%, #D4AF37 100%); }
  .divider .diamond {
    width: 8px; height: 8px;
    background: #D4AF37;
    transform: rotate(45deg);
    box-shadow: 0 0 10px rgba(212,175,55,0.8);
  }

  /* Tagline — clean, spaced caps */
  .tagline {
    font-family: 'Inter', sans-serif;
    font-weight: 400;
    font-size: 24px;
    letter-spacing: 18px;
    text-transform: uppercase;
    color: rgba(245,241,232,0.75);
    text-indent: 18px;
  }

  /* Bottom mark */
  .mark {
    position: absolute;
    bottom: 95px; left: 50%; transform: translateX(-50%);
    z-index: 5;
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    color: rgba(212,175,55,0.7);
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 6px;
    text-transform: uppercase;
  }
</style></head>
<body>
  <div class="icon">
    <div class="frame"></div>

    <div class="center">
      <div class="monogram" style="width:240px;height:240px">
        <svg viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="goldGrad" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%"  stop-color="#FFFFFF"/>
              <stop offset="25%" stop-color="#E8F4FF"/>
              <stop offset="55%" stop-color="#B8D4F0"/>
              <stop offset="80%" stop-color="#7FA8D6"/>
              <stop offset="100%" stop-color="#3D5C82"/>
            </linearGradient>
            <linearGradient id="goldHighlight" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#FFFFFF"/>
              <stop offset="100%" stop-color="#D4E8FF"/>
            </linearGradient>
            <radialGradient id="diamondShimmer" cx="50%" cy="40%" r="60%">
              <stop offset="0%"  stop-color="#FFFFFF" stop-opacity="0.95"/>
              <stop offset="60%" stop-color="#B8D4F0" stop-opacity="0.4"/>
              <stop offset="100%" stop-color="#3D5C82" stop-opacity="0"/>
            </radialGradient>
            <linearGradient id="silverGrad" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="#E8E8E8"/>
              <stop offset="50%" stop-color="#999"/>
              <stop offset="100%" stop-color="#555"/>
            </linearGradient>
          </defs>

          <!-- ── KEY RING (chain holder) at top ── -->
          <circle cx="100" cy="32" r="20"
                  stroke="url(#silverGrad)" stroke-width="5" fill="none"/>
          <circle cx="100" cy="32" r="20"
                  stroke="rgba(255,255,255,0.35)" stroke-width="1.5" fill="none"/>

          <!-- Small chain link connecting ring to key -->
          <ellipse cx="100" cy="58" rx="6" ry="9"
                   stroke="url(#silverGrad)" stroke-width="3" fill="none"
                   transform="rotate(15 100 58)"/>

          <!-- ── KEY BOW (head) — fancy ornate shape ── -->
          <!-- Outer round bow -->
          <circle cx="100" cy="92" r="32" fill="url(#goldGrad)"
                  stroke="#3D5C82" stroke-width="2"/>
          <!-- Inner highlight -->
          <ellipse cx="92" cy="84" rx="14" ry="10"
                   fill="url(#goldHighlight)" opacity="0.55"/>
          <!-- Inner bow cutout (hole) -->
          <circle cx="100" cy="92" r="13"
                  fill="#0a0a0a" stroke="#3D5C82" stroke-width="1.5"/>
          <!-- Decorative inner ring -->
          <circle cx="100" cy="92" r="13"
                  stroke="#FFFFFF" stroke-width="1" fill="none" opacity="0.6"/>
          <!-- Tiny dot accent in cutout -->
          <circle cx="100" cy="92" r="2.5" fill="#FFFFFF"/>

          <!-- Decorative spikes around bow (crown-like) -->
          <circle cx="76"  cy="78" r="3" fill="url(#goldGrad)"/>
          <circle cx="124" cy="78" r="3" fill="url(#goldGrad)"/>
          <circle cx="68"  cy="92" r="2.5" fill="url(#goldGrad)"/>
          <circle cx="132" cy="92" r="2.5" fill="url(#goldGrad)"/>

          <!-- Connection between bow and shaft (collar) -->
          <rect x="92" y="120" width="16" height="10"
                fill="url(#goldGrad)" stroke="#3D5C82" stroke-width="1"/>
          <line x1="92" y1="125" x2="108" y2="125"
                stroke="rgba(255,255,255,0.4)" stroke-width="1"/>

          <!-- ── SHAFT (long body of key) ── -->
          <rect x="95" y="130" width="10" height="50"
                fill="url(#goldGrad)" stroke="#3D5C82" stroke-width="1.5"/>
          <!-- Shaft highlight strip -->
          <rect x="97" y="132" width="2.5" height="46"
                fill="rgba(255,255,255,0.5)"/>

          <!-- ── TEETH (bit) on the right side ── -->
          <!-- Big tooth -->
          <rect x="105" y="158" width="14" height="9"
                fill="url(#goldGrad)" stroke="#3D5C82" stroke-width="1.2"/>
          <!-- Small notch tooth -->
          <rect x="105" y="170" width="9" height="6"
                fill="url(#goldGrad)" stroke="#3D5C82" stroke-width="1.2"/>
          <!-- Tip rounded -->
          <circle cx="100" cy="180" r="5"
                  fill="url(#goldGrad)" stroke="#3D5C82" stroke-width="1"/>
        </svg>
      </div>

      <div class="word">Nodalali<span class="dot">.</span></div>

      <div class="divider">
        <div class="line"></div>
        <div class="diamond"></div>
        <div class="line right"></div>
      </div>

      <div class="tagline">Nyumba Bila Dalali</div>
    </div>

    <div class="mark">
      <div>· Tanzania ·</div>
    </div>
  </div>
</body></html>
