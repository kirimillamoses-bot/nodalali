<!DOCTYPE html>
<html lang="sw">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
  <meta name="theme-color" content="#0f766e" />
  <title>Nodalali — Pangisha Bila Dalali</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>
<body>
  <header class="app-header">
    <div class="hero-bg" style="background-image:url('hero.jpg')"></div>
    <div class="header-row">
      <div class="brand">
        <img src="icon.svg" alt="Nodalali" class="logo" />
        <div>
          <h1>Nodalali</h1>
          <small>Pangisha bila dalali 🇹🇿</small>
        </div>
      </div>
      <button id="authBtn" class="btn-ghost">Ingia</button>
    </div>
  </header>

  <nav class="tabs">
    <button class="tab active" data-tab="browse">🔍 Tafuta</button>
    <button class="tab" data-tab="map">🗺️ Ramani</button>
    <button class="tab" data-tab="favorites">❤️ Pendwa</button>
    <button class="tab" data-tab="my-listings">🏠 Zangu</button>
    <button class="tab" data-tab="post">➕ Tangaza</button>
  </nav>

  <main>
    <!-- BROWSE -->
    <section id="browse" class="view active">
      <div class="filters">
        <input id="searchCity" placeholder="Mji au eneo (mfano: Mikocheni)" />
        <select id="filterBedrooms">
          <option value="">Vyumba vyote</option>
          <option value="1">Chumba 1</option>
          <option value="2">Vyumba 2</option>
          <option value="3">Vyumba 3</option>
          <option value="4">Vyumba 4+</option>
        </select>
        <select id="filterPrice">
          <option value="">Bei zote</option>
          <option value="200000">Hadi 200,000</option>
          <option value="500000">Hadi 500,000</option>
          <option value="1000000">Hadi 1,000,000</option>
          <option value="3000000">Hadi 3,000,000</option>
        </select>
      </div>
      <div id="listingsGrid" class="grid"></div>
    </section>

    <!-- MAP -->
    <section id="map" class="view">
      <div id="leafletMap"></div>
    </section>

    <!-- FAVORITES -->
    <section id="favorites" class="view">
      <h2>Nyumba Ulizopenda</h2>
      <div id="favoritesGrid" class="grid"></div>
    </section>

    <!-- MY LISTINGS -->
    <section id="my-listings" class="view">
      <h2>Matangazo Yangu</h2>
      <div id="myListingsGrid" class="grid"></div>
    </section>

    <!-- POST -->
    <section id="post" class="view">
      <h2>Tangaza Nyumba Yako</h2>
      <p class="hint">Bei: TZS 5,000 kwa siku 30. Ada ya verification: TZS 10,000.</p>
      <form id="listingForm" class="form">
        <label>Kichwa cha tangazo
          <input name="title" required placeholder="Mfano: Nyumba ya vyumba 3 Mikocheni" />
        </label>
        <label>Mji
          <select name="city" required>
            <option value="">Chagua mji</option>
            <option>Dar es Salaam</option>
            <option>Dodoma</option>
            <option>Arusha</option>
            <option>Mwanza</option>
            <option>Mbeya</option>
            <option>Tanga</option>
            <option>Morogoro</option>
            <option>Zanzibar</option>
          </select>
        </label>
        <label>Eneo (Kata/Mtaa)
          <input name="area" required placeholder="Mfano: Mikocheni B" />
        </label>
        <div class="row">
          <label>Vyumba vya kulala
            <input name="bedrooms" type="number" min="0" max="10" required />
          </label>
          <label>Bafu
            <input name="bathrooms" type="number" min="0" max="10" required />
          </label>
          <label>Bei (TZS/mwezi)
            <input name="price" type="number" min="0" step="10000" required />
          </label>
        </div>
        <label>Aina ya nyumba
          <select name="type" required>
            <option value="house">Nyumba nzima</option>
            <option value="apartment">Apartment</option>
            <option value="room">Chumba kimoja</option>
            <option value="self">Self contained</option>
            <option value="commercial">Biashara/Ofisi</option>
          </select>
        </label>
        <label>Maelezo
          <textarea name="description" rows="4" placeholder="Eleza nyumba: maji, umeme, parking, security..."></textarea>
        </label>
        <label>Picha za nyumba (chagua hadi 5)
          <input type="file" id="imageUpload" accept="image/*" multiple />
          <div id="imagePreview" class="image-preview"></div>
        </label>
        <div class="row">
          <label>Latitude (hiari)
            <input name="lat" type="number" step="any" placeholder="-6.7924" />
          </label>
          <label>Longitude (hiari)
            <input name="lng" type="number" step="any" placeholder="39.2083" />
          </label>
        </div>
        <label>Namba ya WhatsApp (255...)
          <input name="whatsapp" required pattern="255[0-9]{9}" placeholder="255712345678" />
        </label>
        <button type="submit" class="btn-primary">Tangaza Sasa</button>
      </form>
    </section>
  </main>

  <!-- DETAIL MODAL -->
  <div id="detailModal" class="modal">
    <div class="modal-content">
      <button class="modal-close" onclick="closeDetail()">✕</button>
      <div id="detailBody"></div>
    </div>
  </div>

  <!-- AUTH MODAL -->
  <div id="authModal" class="modal">
    <div class="modal-content">
      <button class="modal-close" onclick="closeAuth()">✕</button>
      <h2 id="authTitle">Ingia</h2>
      <form id="authForm" class="form">
        <input name="email" type="email" placeholder="Barua pepe" required />
        <input name="password" type="password" placeholder="Nenosiri" required minlength="6" />
        <button type="submit" class="btn-primary">Endelea</button>
      </form>
      <p class="hint">
        <a href="#" id="toggleAuth">Huna akaunti? Jisajili</a>
      </p>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="firebase-config.js"></script>
  <script src="script.js"></script>
</body>
</html>
