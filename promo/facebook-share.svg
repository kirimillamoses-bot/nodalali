<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgF" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f766e"/>
      <stop offset="100%" stop-color="#065f5b"/>
    </linearGradient>
    <linearGradient id="houseF" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff"/>
      <stop offset="100%" stop-color="#fef3c7"/>
    </linearGradient>
    <filter id="dsF"><feDropShadow dx="0" dy="6" stdDeviation="10" flood-opacity=".35"/></filter>
    <filter id="tsF"><feDropShadow dx="0" dy="3" stdDeviation="6" flood-opacity=".4"/></filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bgF)"/>

  <!-- TZ flag stripe -->
  <path d="M0,580 L80,630 L1200,630 L1200,600 Z" fill="#1eb53a" opacity=".4"/>
  <path d="M0,610 L40,630 L1200,630 L1200,620 Z" fill="#fcd34d" opacity=".5"/>

  <!-- Sun -->
  <circle cx="1050" cy="140" r="70" fill="#fde047" opacity=".9"/>

  <!-- Kilimanjaro silhouette -->
  <path d="M0,400 L120,330 L240,360 L380,260 L500,330 L620,290 L760,360 L900,320 L1100,400 L1200,400 L1200,500 L0,500 Z" fill="#fff" opacity=".1"/>

  <!-- LEFT SIDE: House -->
  <g filter="url(#dsF)">
    <path d="M280,260 L150,380 L410,380 Z" fill="#dc2626"/>
    <rect x="170" y="380" width="220" height="160" fill="url(#houseF)"/>
    <rect x="260" y="430" width="50" height="110" rx="3" fill="#0f766e"/>
    <rect x="265" y="436" width="40" height="98" rx="2" fill="none" stroke="#fcd34d" stroke-width="1.5"/>
    <circle cx="275" cy="442" r="3" fill="#fcd34d"/>
    <circle cx="295" cy="442" r="3" fill="#fcd34d"/>
    <circle cx="275" cy="452" r="3" fill="#fcd34d"/>
    <circle cx="295" cy="452" r="3" fill="#fcd34d"/>
    <rect x="190" y="400" width="40" height="36" fill="#7dd3fc"/>
    <line x1="210" y1="400" x2="210" y2="436" stroke="#0369a1" stroke-width="1.5"/>
    <rect x="340" y="400" width="40" height="36" fill="#7dd3fc"/>
    <line x1="360" y1="400" x2="360" y2="436" stroke="#0369a1" stroke-width="1.5"/>
    <line x1="280" y1="220" x2="280" y2="263" stroke="#374151" stroke-width="3"/>
    <rect x="280" y="220" width="40" height="26" fill="#1eb53a"/>
    <path d="M280,220 L320,246 L320,234 L300,220 Z" fill="#000"/>
    <path d="M320,246 L304,246 L320,234 Z" fill="#fcd34d"/>
  </g>

  <!-- Palm -->
  <g filter="url(#dsF)">
    <path d="M70,540 Q72,440 64,360" stroke="#78350f" stroke-width="8" fill="none" stroke-linecap="round"/>
    <g fill="#15803d">
      <path d="M64,358 Q34,338 12,346 Q34,358 64,370 Z"/>
      <path d="M64,358 Q94,338 116,346 Q94,358 64,370 Z"/>
      <path d="M64,358 Q46,322 36,290 Q60,322 70,366 Z"/>
    </g>
  </g>

  <!-- RIGHT SIDE: Text -->
  <text x="500" y="180" fill="#fff" font-family="Helvetica, Arial, sans-serif" font-weight="900" font-size="64" filter="url(#tsF)" letter-spacing="-1">
    Pangisha Nyumba
  </text>
  <text x="500" y="270" fill="#fde047" font-family="Helvetica, Arial, sans-serif" font-weight="900" font-size="96" filter="url(#tsF)" letter-spacing="-3">
    BILA DALALI
  </text>

  <text x="500" y="350" fill="#fff" font-family="Helvetica, Arial, sans-serif" font-weight="600" font-size="32" opacity=".95">
    Tanzania nzima · Dar · Arusha · Mwanza
  </text>

  <!-- Pill bullets -->
  <g font-family="Helvetica, Arial, sans-serif" font-weight="700" font-size="22">
    <rect x="500" y="390" width="180" height="40" rx="20" fill="#fff"/>
    <text x="590" y="416" text-anchor="middle" fill="#0f766e">✓ M-Pesa</text>

    <rect x="690" y="390" width="220" height="40" rx="20" fill="#fff"/>
    <text x="800" y="416" text-anchor="middle" fill="#0f766e">✓ Hakuna ada</text>

    <rect x="500" y="442" width="240" height="40" rx="20" fill="#fde047"/>
    <text x="620" y="468" text-anchor="middle" fill="#7f1d1d">✓ Wasiliana moja kwa moja</text>
  </g>

  <text x="500" y="540" fill="#fff" font-family="Helvetica, Arial, sans-serif" font-weight="900" font-size="42" letter-spacing="-1">
    🏠 NODALALI
  </text>
</svg>
