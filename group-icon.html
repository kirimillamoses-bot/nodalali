<!doctype html>
<html><head><meta charset="utf-8"/><title>Nodalali Group Icon</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;700&display=swap" rel="stylesheet">
<style>
  html, body { margin:0; padding:0; background:#000; }
  /* 1024×1024 — but everything important inside the inscribed circle (radius 512) */
  .icon {
    width: 1024px; height: 1024px;
    position: relative; overflow: hidden;
    /* Background: dramatic radial gradient — ensures the visible circle is filled */
    background:
      radial-gradient(circle at 50% 38%, #2a3a5e 0%, #1a2540 35%, #0a0e1c 70%, #050810 100%);
    display: flex; align-items: center; justify-content: center;
  }

  /* Subtle ambient sparkles — kept inside circle */
  .sparkle {
    position: absolute; color: #fff;
    text-shadow: 0 0 20px #fff, 0 0 40px #B8D4F0;
    z-index: 2;
  }

  /* Inner subtle ring (decorative, fully inside circle) */
  .ring {
    position: absolute; width: 880px; height: 880px;
    border: 1px solid rgba(184,212,240,0.15);
    border-radius: 50%;
    box-shadow: inset 0 0 80px rgba(184,212,240,0.08);
    z-index: 1;
  }

  .center {
    position: relative; z-index: 5;
    display: flex; flex-direction: column; align-items: center;
    text-align: center;
  }

  .key { width: 360px; height: 360px; margin-bottom: 28px; }
  .key svg { width: 100%; height: 100%;
    filter: drop-shadow(0 0 30px rgba(200,225,255,0.85))
            drop-shadow(0 0 70px rgba(184,212,240,0.55))
            drop-shadow(0 18px 30px rgba(0,0,0,0.6));
  }

  .word {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 700;
    font-size: 152px;
    letter-spacing: -3px;
    line-height: 0.95;
    background: linear-gradient(180deg, #FFFFFF 0%, #E8F4FF 50%, #B8D4F0 100%);
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow: 0 6px 30px rgba(0,0,0,0.5);
  }
</style></head>
<body>
  <div class="icon">
    <div class="ring"></div>

    <span class="sparkle" style="top:200px;left:280px;font-size:28px">✦</span>
    <span class="sparkle" style="top:340px;right:230px;font-size:22px">✧</span>
    <span class="sparkle" style="bottom:280px;left:240px;font-size:26px">✦</span>
    <span class="sparkle" style="bottom:200px;right:300px;font-size:20px">✧</span>

    <div class="center">
      <div class="key">
        <svg viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="diamond" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%"  stop-color="#FFFFFF"/>
              <stop offset="25%" stop-color="#E8F4FF"/>
              <stop offset="55%" stop-color="#B8D4F0"/>
              <stop offset="80%" stop-color="#7FA8D6"/>
              <stop offset="100%" stop-color="#3D5C82"/>
            </linearGradient>
            <linearGradient id="diamondHi" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#FFFFFF"/>
              <stop offset="100%" stop-color="#D4E8FF"/>
            </linearGradient>
            <linearGradient id="silver" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="#F0F0F0"/>
              <stop offset="50%" stop-color="#A0A0A0"/>
              <stop offset="100%" stop-color="#5A5A5A"/>
            </linearGradient>
          </defs>
          <!-- Chain ring -->
          <circle cx="100" cy="32" r="20" stroke="url(#silver)" stroke-width="5" fill="none"/>
          <circle cx="100" cy="32" r="20" stroke="rgba(255,255,255,0.4)" stroke-width="1.5" fill="none"/>
          <!-- Chain link -->
          <ellipse cx="100" cy="58" rx="6" ry="9" stroke="url(#silver)" stroke-width="3" fill="none" transform="rotate(15 100 58)"/>
          <!-- Bow -->
          <circle cx="100" cy="92" r="32" fill="url(#diamond)" stroke="#3D5C82" stroke-width="2"/>
          <ellipse cx="92" cy="84" rx="14" ry="10" fill="url(#diamondHi)" opacity="0.6"/>
          <circle cx="100" cy="92" r="13" fill="#0a0e1c" stroke="#3D5C82" stroke-width="1.5"/>
          <circle cx="100" cy="92" r="13" stroke="#FFFFFF" stroke-width="1" fill="none" opacity="0.6"/>
          <circle cx="100" cy="92" r="2.5" fill="#FFFFFF"/>
          <!-- Crown spikes -->
          <circle cx="76"  cy="78" r="3" fill="url(#diamond)"/>
          <circle cx="124" cy="78" r="3" fill="url(#diamond)"/>
          <circle cx="68"  cy="92" r="2.5" fill="url(#diamond)"/>
          <circle cx="132" cy="92" r="2.5" fill="url(#diamond)"/>
          <!-- Collar -->
          <rect x="92" y="120" width="16" height="10" fill="url(#diamond)" stroke="#3D5C82" stroke-width="1"/>
          <line x1="92" y1="125" x2="108" y2="125" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
          <!-- Shaft -->
          <rect x="95" y="130" width="10" height="50" fill="url(#diamond)" stroke="#3D5C82" stroke-width="1.5"/>
          <rect x="97" y="132" width="2.5" height="46" fill="rgba(255,255,255,0.55)"/>
          <!-- Teeth -->
          <rect x="105" y="158" width="14" height="9" fill="url(#diamond)" stroke="#3D5C82" stroke-width="1.2"/>
          <rect x="105" y="170" width="9" height="6" fill="url(#diamond)" stroke="#3D5C82" stroke-width="1.2"/>
          <circle cx="100" cy="180" r="5" fill="url(#diamond)" stroke="#3D5C82" stroke-width="1"/>
        </svg>
      </div>
      <div class="word">Nodalali</div>
    </div>
  </div>
</body></html>
