<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 280" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="50%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#16a34a"/>
      <stop offset="100%" stop-color="#15803d"/>
    </linearGradient>
    <linearGradient id="house2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff"/>
      <stop offset="100%" stop-color="#fef3c7"/>
    </linearGradient>
    <linearGradient id="ocean" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#0e7490"/>
    </linearGradient>
    <filter id="hShadow"><feDropShadow dx="0" dy="3" stdDeviation="3" flood-opacity=".3"/></filter>
  </defs>

  <!-- sunset sky -->
  <rect width="800" height="200" fill="url(#sky)"/>

  <!-- sun -->
  <circle cx="600" cy="160" r="50" fill="#fef3c7" opacity=".95"/>
  <circle cx="600" cy="160" r="38" fill="#fde047"/>

  <!-- distant Kilimanjaro silhouette -->
  <path d="M0,180 L60,140 L120,160 L200,110 L280,150 L360,130 L420,160 L500,140 L580,170 L680,150 L800,180 L800,200 L0,200 Z" fill="#7f1d1d" opacity=".4"/>
  <path d="M180,108 L210,100 L240,108" stroke="#fff" stroke-width="3" fill="none" opacity=".7"/>

  <!-- ocean band -->
  <rect y="200" width="800" height="20" fill="url(#ocean)"/>
  <path d="M0,210 Q100,205 200,210 T400,210 T600,210 T800,210" stroke="#fff" stroke-width="1" fill="none" opacity=".4"/>

  <!-- ground -->
  <rect y="220" width="800" height="60" fill="url(#ground)"/>

  <!-- left palm -->
  <g filter="url(#hShadow)">
    <path d="M80,260 Q82,200 76,160" stroke="#78350f" stroke-width="6" fill="none" stroke-linecap="round"/>
    <g fill="#15803d">
      <path d="M76,158 Q50,140 30,148 Q52,160 76,168 Z"/>
      <path d="M76,158 Q102,140 122,148 Q100,160 76,168 Z"/>
      <path d="M76,158 Q60,130 50,108 Q72,138 80,162 Z"/>
      <path d="M76,158 Q92,130 102,108 Q80,138 72,162 Z"/>
    </g>
  </g>

  <!-- right palm -->
  <g filter="url(#hShadow)">
    <path d="M740,260 Q742,200 736,170" stroke="#78350f" stroke-width="5" fill="none" stroke-linecap="round"/>
    <g fill="#16a34a">
      <path d="M736,168 Q716,150 700,156 Q720,166 736,174 Z"/>
      <path d="M736,168 Q756,150 772,156 Q752,166 736,174 Z"/>
      <path d="M736,168 Q724,144 718,128 Q734,148 740,170 Z"/>
    </g>
  </g>

  <!-- main house (Tanzania traditional/modern hybrid) -->
  <g filter="url(#hShadow)">
    <!-- roof -->
    <path d="M400,90 L320,160 L480,160 Z" fill="#dc2626"/>
    <path d="M400,90 L320,160 L480,160 Z" fill="url(#sky)" opacity=".2"/>
    <!-- wall -->
    <rect x="330" y="160" width="140" height="80" fill="url(#house2)"/>
    <!-- door (Zanzibar-inspired carved door, teal) -->
    <rect x="385" y="190" width="30" height="50" rx="3" fill="#0f766e"/>
    <rect x="388" y="193" width="24" height="44" rx="2" fill="none" stroke="#fcd34d" stroke-width="1"/>
    <circle cx="395" cy="195" r="2" fill="#fcd34d"/>
    <circle cx="405" cy="195" r="2" fill="#fcd34d"/>
    <circle cx="395" cy="200" r="2" fill="#fcd34d"/>
    <circle cx="405" cy="200" r="2" fill="#fcd34d"/>
    <!-- windows -->
    <rect x="345" y="175" width="22" height="20" rx="1" fill="#7dd3fc"/>
    <line x1="356" y1="175" x2="356" y2="195" stroke="#0369a1" stroke-width="1"/>
    <line x1="345" y1="185" x2="367" y2="185" stroke="#0369a1" stroke-width="1"/>
    <rect x="433" y="175" width="22" height="20" rx="1" fill="#7dd3fc"/>
    <line x1="444" y1="175" x2="444" y2="195" stroke="#0369a1" stroke-width="1"/>
    <line x1="433" y1="185" x2="455" y2="185" stroke="#0369a1" stroke-width="1"/>
    <!-- TZ flag on roof -->
    <line x1="400" y1="60" x2="400" y2="92" stroke="#374151" stroke-width="2"/>
    <rect x="400" y="60" width="22" height="14" fill="#1eb53a"/>
    <path d="M400,60 L422,74 L422,67 L408,60 Z" fill="#000"/>
    <path d="M422,74 L411,74 L422,67 Z" fill="#fcd34d"/>
  </g>

  <!-- second smaller house (community) -->
  <g filter="url(#hShadow)" opacity=".95">
    <path d="M180,170 L140,210 L220,210 Z" fill="#f59e0b"/>
    <rect x="148" y="210" width="64" height="40" fill="#fff"/>
    <rect x="172" y="225" width="16" height="25" fill="#0f766e"/>
    <rect x="156" y="218" width="10" height="8" fill="#7dd3fc"/>
    <rect x="194" y="218" width="10" height="8" fill="#7dd3fc"/>
  </g>

  <g filter="url(#hShadow)" opacity=".95">
    <path d="M620,180 L580,215 L660,215 Z" fill="#0891b2"/>
    <rect x="588" y="215" width="64" height="35" fill="#fff"/>
    <rect x="612" y="225" width="16" height="25" fill="#dc2626"/>
    <rect x="596" y="220" width="10" height="8" fill="#7dd3fc"/>
    <rect x="634" y="220" width="10" height="8" fill="#7dd3fc"/>
  </g>

  <!-- birds -->
  <path d="M250,80 Q258,72 266,80 Q274,72 282,80" stroke="#1f2937" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M500,60 Q506,54 512,60 Q518,54 524,60" stroke="#1f2937" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M340,50 Q344,46 348,50 Q352,46 356,50" stroke="#1f2937" stroke-width="1.5" fill="none" stroke-linecap="round"/>
</svg>
